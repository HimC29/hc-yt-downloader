<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC-YT Downloader</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="shortcut icon" href="/static/media/logo.svg" type="image/x-icon">
</head>
<body>
    <div class="card">
        <div class="title-row">
            <img src="/static/media/logo.svg" alt="logo" width="86" height="86">
            <h1>HC-YT Downloader</h1>
        </div>
        <form>
            <input id="input" type="text" autocomplete="off" placeholder="Paste a YouTube URL...">
            <div class="btn-row">
                <button id="video-audio-toggle" type="button">Video</button>
                <button id="submit" type="submit">Download</button>
            </div>
        </form>
    </div>
    <footer>
        <p class="footer-tagline">No ads. No tracking. Just downloads.</p>
        <div class="footer-links">
            <a href="https://github.com/HimC29">Him C.</a>
            <span class="footer-dot">·</span>
            <a href="https://github.com/HimC29/hc-yt-downloader">GitHub</a>
            <span class="footer-dot">·</span>
            <a href="/LICENSE">GNU GPL v3</a>
        </div>
    </footer>

    <script src="/static/main.js"></script>
</body>
</html>
